---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
    
    {%- for post in site.posts -%}
        {% if {{ page.page_category }} in {{ post.categories }} %}
           <br> post </br>
        {% endif %}
    {%- endfor -%}
  </div>

</article>
