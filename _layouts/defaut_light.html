<!DOCTYPE html>
{% comment %} 
  This is a lighter version of the defaut layout, without header.
{% endcomment %}

<html>
  
  <head>
    <title> Title of default static layout</title>
  </head>
  
  <body>
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        <article class="post">    
          <header class="post-header">
            <h1 class="post-title">{{ page.title | escape }}</h1>
          </header>

          <div class="post-content">
            {{ content }}
          </div>
        </article>
        
      </div>
    </main>
  </body>
  
</html>
